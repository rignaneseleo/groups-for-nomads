name: PR Link Checker

on:
  pull_request:
    paths:
      - "data.yaml"

jobs:
  check-new-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract new URLs from diff
        id: extract
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- data.yaml \
            | grep '^+' | grep -v '^+++' \
            | grep -oP 'https?://[^\s"'"'"'>,)]+' \
            | sort -u > /tmp/new_urls.txt || true

          count=$(wc -l < /tmp/new_urls.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count new/changed URLs:"
          cat /tmp/new_urls.txt

      - name: Check new links
        if: steps.extract.outputs.count != '0'
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: >-
            --verbose
            --no-progress
            --exclude 'reddit\.com'
            -- /tmp/new_urls.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No new links
        if: steps.extract.outputs.count == '0'
        run: echo "No new URLs found in this PR, skipping link check."
